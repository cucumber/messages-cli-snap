name: cucumber-messages
version: "0.2.9"
summary: A commandline interface for working with Cucumber Messages
description: |
  Cucumber can output test results in newline delimited json format. This
  format can then be transformed into different reports. 
  
  This tool supports the conversion of cucumber messages into cucumber-json,
  html, junit-xml and testng-xml reports.

grade: stable
confinement: strict
base: core20
type: app

architectures:
  - build-on: [amd64, arm64]
    
    
apps:
  cucumber-messages:
    command: bin/cucumber-messages
    environment:
      JAVA_HOME: "$SNAP/usr/lib/jvm/java-21-openjdk-${SNAP_ARCH}"
      PATH: "$SNAP/bin:$PATH:$JAVA_HOME/bin"
    plugs:
      - home

parts:
  cucumber-messages:
    plugin: dump
    source: https://github.com/cucumber/messages-cli/releases/download/v0.2.9/cucumber-messages-0.2.9.tar.gz
    source-checksum: sha256/a2d575772965d4c8fd2ea90b87f9c2358944f4a009fcaf2cfa6112a2a0830c0f
    stage-packages:
      - curl
      - openjdk-21-jre
      - ca-certificates
      - ca-certificates-java
    organize:
      'usr/lib/jvm/java-*': 'usr/lib/jvm/java'
    prime:
      - -usr/lib/jvm/java/lib/security/cacerts
