name: cucumber-messages
title: Cucumber Messages CLI
version: "0.2.12"
summary: A commandline interface to work with Cucumber Messages
description: |
  Cucumber can output test results in newline delimited json format. This
  format can then be transformed into different reports. 
  
  This tool supports the conversion of cucumber messages into cucumber-json,
  html, junit-xml and testng-xml reports.

license: MIT AND Apache-2.0 AND (GPL-2.0 WITH Classpath-exception-2.0)

website: https://cucumber.io
source-code: https://github.com/cucumber/messages-cli
contact: https://cucumber.io/community
issues: https://github.com/cucumber/messages-cli
donation: https://opencollective.com/cucumber

grade: stable
confinement: strict
base: core24
type: app

platforms:
  amd64:
    build-on:
      - amd64
    build-for:
      - amd64
  arm64:
    build-on:
      - arm64
    build-for:
      - arm64

apps:
  cucumber-messages:
    command: bin/cucumber-messages
    plugs:
      - home

parts:
  cucumber-messages:
    plugin: dump
    source: https://github.com/cucumber/messages-cli/releases/download/v0.2.12/cucumber-messages-0.2.12.tar.gz
